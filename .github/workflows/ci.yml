name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: video_studio_test
          POSTGRES_USER: videostudio
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r video_studio_module/backend/requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        flake8 video_studio_module/backend --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 video_studio_module/backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests
      run: |
        cd video_studio_module/backend
        python manage.py test
      env:
        DATABASE_URL: postgresql://videostudio:test_password@localhost:5432/video_studio_test
        SECRET_KEY: test-secret-key-for-ci
    
    - name: Check security
      run: |
        pip install safety
        safety check
